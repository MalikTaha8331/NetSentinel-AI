<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NetSentinel AI — Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0e1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: #111827; border: 1px solid #1f4e79; border-radius: 12px; padding: 40px; width: 380px; }
        h2 { color: #2e75b6; text-align: center; margin-bottom: 8px; font-size: 24px; }
        p.sub { text-align: center; color: #888; font-size: 13px; margin-bottom: 28px; }
        input { width: 100%; padding: 12px; margin-bottom: 16px; background: #1a2235; border: 1px solid #2e75b6; border-radius: 8px; color: #fff; font-size: 14px; }
        button { width: 100%; padding: 12px; background: #2e75b6; color: #fff; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: bold; }
        button:hover { background: #1f4e79; }
        .flash { padding: 10px; border-radius: 6px; margin-bottom: 16px; font-size: 13px; background: #2a1a1a; color: #ff6b6b; border: 1px solid #ff4444; }
        a { color: #2e75b6; text-decoration: none; font-size: 13px; display: block; text-align: center; margin-top: 16px; }
    </style>
</head>
<body>
<div class="card">
    <h2>⚡ NetSentinel AI</h2>
    <p class="sub">AI-Powered Network Security Scanner</p>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="flash">{{ message }}</div>
        {% endfor %}
    {% endwith %}
    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
    <a href="{{ url_for('auth.register') }}">Don't have an account? Register</a>
</div>
</body>
</html>
